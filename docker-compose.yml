version: '3.8'

services:
  # 1. PostgreSQL Database Server
  postgres:
    image: postgres:16-alpine
    container_name: flipamaz-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flipamaz_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./services/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  # 2. Redis Caching Engine & Event Bus Broker
  redis:
    image: redis:7-alpine
    container_name: flipamaz-redis
    restart: always
    ports:
      - "6379:6379"

  # 3. Nginx API Gateway & Load Balancer
  gateway:
    image: nginx:alpine
    container_name: flipamaz-gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - auth-service
      - catalog-service
      - cart-service
      - order-service
      - rating-service
      - notification-service

  # 4. Next.js Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flipamaz-frontend
    restart: always
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - catalog-service

  # 5. Auth & User Microservice
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: flipamaz-auth-service
    restart: always
    environment:
      - PORT=4001
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/flipamaz_db?schema=auth
    depends_on:
      - postgres
    command: sh -c "until npx prisma db push; do echo 'Waiting for DB...'; sleep 2; done && node server.js"

  # 6. Catalog & Product Microservice
  catalog-service:
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
    container_name: flipamaz-catalog-service
    restart: always
    environment:
      - PORT=4002
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/flipamaz_db?schema=catalog
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    command: sh -c "until npx prisma db push; do echo 'Waiting for DB...'; sleep 2; done && node server.js"

  # 7. Cart & Inventory Microservice
  cart-service:
    build:
      context: ./services/cart-service
      dockerfile: Dockerfile
    container_name: flipamaz-cart-service
    restart: always
    environment:
      - PORT=4003
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/flipamaz_db?schema=orders
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    command: sh -c "until npx prisma db push; do echo 'Waiting for DB...'; sleep 2; done && node server.js"

  # 8. Orders & Analytics Microservice
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: flipamaz-order-service
    restart: always
    environment:
      - PORT=4004
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/flipamaz_db?schema=orders
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    command: sh -c "until npx prisma db push; do echo 'Waiting for DB...'; sleep 2; done && node server.js"

  # 9. Rating & Review Microservice
  rating-service:
    build:
      context: ./services/rating-service
      dockerfile: Dockerfile
    container_name: flipamaz-rating-service
    restart: always
    environment:
      - PORT=4005
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/flipamaz_db?schema=rating
    depends_on:
      - postgres
    command: sh -c "until npx prisma db push; do echo 'Waiting for DB...'; sleep 2; done && node server.js"

  # 10. Notification Microservice
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: flipamaz-notification-service
    restart: always
    environment:
      - PORT=4006
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/flipamaz_db?schema=notification
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    command: sh -c "until npx prisma db push; do echo 'Waiting for DB...'; sleep 2; done && node server.js"

volumes:
  pgdata:
